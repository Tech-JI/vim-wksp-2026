name: build-neovim-bundle

on:
  push:
    branches:
      - main
      - ci/cross-build
  pull_request:
  workflow_dispatch:

jobs:
  bundle:
    uses: zzjc1234/nvim-portable/.github/workflows/neovim-bundle.yml@main
    with:
      config_path: docker
      bootstrap_script: .github/nvim/bootstrap.sh
      smoke_script: .github/nvim/smoke.sh
      verify_script: .github/nvim/verify.sh
      bundle_name: nvim-bundle
      app_name: nvim
      neovim_version: v0.11.7
      target_arches: amd64,arm64
      build_container_image: ubuntu:24.04
      test_container_image: ubuntu:24.04
      build_apt_packages: bash build-essential ca-certificates clangd clang-format curl fd-find file git python3 python3-pylsp ripgrep shellcheck unzip xz-utils
      test_apt_packages: bash ca-certificates fd-find file git python3 ripgrep xz-utils
      output_dir: .nvim-portable/out
      test_install_root: /opt/nvim-bundle-test
      required_bundle_paths: |
        xdg/data/nvim/lazy/Comment.nvim
        xdg/data/nvim/lazy/bufferline.nvim
        xdg/data/nvim/lazy/cmp-buffer
        xdg/data/nvim/lazy/cmp-cmdline
        xdg/data/nvim/lazy/cmp-dictionary
        xdg/data/nvim/lazy/cmp-nvim-lsp
        xdg/data/nvim/lazy/cmp-path
        xdg/data/nvim/lazy/cmp-vsnip
        xdg/data/nvim/lazy/flash.nvim
        xdg/data/nvim/lazy/formatter.nvim
        xdg/data/nvim/lazy/friendly-snippets
        xdg/data/nvim/lazy/indent-blankline.nvim
        xdg/data/nvim/lazy/lazy.nvim
        xdg/data/nvim/lazy/lspkind-nvim
        xdg/data/nvim/lazy/lualine.nvim
        xdg/data/nvim/lazy/nvim-autopairs
        xdg/data/nvim/lazy/nvim-cmp
        xdg/data/nvim/lazy/nvim-lint
        xdg/data/nvim/lazy/nvim-lspconfig
        xdg/data/nvim/lazy/nvim-tree.lua
        xdg/data/nvim/lazy/nvim-treesitter
        xdg/data/nvim/lazy/nvim-treesitter-textobjects
        xdg/data/nvim/lazy/nvim-web-devicons
        xdg/data/nvim/lazy/outline.nvim
        xdg/data/nvim/lazy/plenary.nvim
        xdg/data/nvim/lazy/snacks.nvim
        xdg/data/nvim/lazy/telescope-zoxide
        xdg/data/nvim/lazy/telescope.nvim
        xdg/data/nvim/lazy/todo-comments.nvim
        xdg/data/nvim/lazy/tokyonight.nvim
        xdg/data/nvim/lazy/trouble.nvim
        xdg/data/nvim/lazy/vim-snippets
        xdg/data/nvim/lazy/vim-vsnip
        xdg/data/nvim/lazy/which-key.nvim
      required_treesitter_parsers: |
        lua
        vim
        vimdoc
        query
        bash
